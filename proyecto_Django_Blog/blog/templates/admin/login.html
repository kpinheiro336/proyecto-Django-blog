<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Librería Folium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f7f4ef;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            margin: 1rem;
        }

        .login-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 60%, #0f3460 100%);
            border-bottom: 3px solid #e94560;
            border-radius: 12px 12px 0 0;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .login-header h1 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
        }
        .login-header p {
            color: #d4c5a9;
            font-size: 0.88rem;
            margin-top: 0.5rem;
            font-weight: 300;
        }

        .login-body {
            background: #ffffff;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            padding: 2rem 1.8rem;
        }

        .error-msg {
            background: #fff0f0;
            color: #c0392b;
            padding: 0.7rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border-left: 3px solid #e94560;
        }

        .field { margin-bottom: 1rem; }
        .field label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #2d2d2d;
            margin-bottom: 5px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0c8be;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #111827;
            background: #fff;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .field input:focus {
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.12);
        }

        .login-btn {
            width: 100%;
            padding: 11px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover { background: #c73652; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h1>📚 Librería Folium</h1>
            <p>Panel de administración</p>
        </div>

        <div class="login-body">
            <form action="{% url 'admin:login' %}" method="post">
                {% csrf_token %}

                {% if form.errors %}
                <div class="error-msg">
                    Usuario o contraseña incorrectos. Intenta de nuevo.
                </div>
                {% endif %}

                <div class="field">
                    <label for="id_username">Usuario</label>
                    <input type="text" name="username" id="id_username" autofocus>
                </div>

                <div class="field">
                    <label for="id_password">Contraseña</label>
                    <input type="password" name="password" id="id_password">
                </div>

                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="login-btn">Iniciar sesión</button>
            </form>
        </div>
    </div>

</body>
</html>
